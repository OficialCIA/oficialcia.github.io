<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria dos Visitantes - Kayque Olimpio</title>
  <meta name="description" content="Galeria onde usuários podem enviar e visualizar desenhos.">
  <meta name="theme-color" content="#c2e9fb">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Quicksand', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-blue-200 min-h-screen flex flex-col items-center py-12 px-4">

  <header class="w-full max-w-4xl mb-8">
    <nav>
      <ul class="flex justify-center space-x-6 text-xl">
        <li><a href="index.html" class="font-bold text-gray-700 hover:text-blue-600">Início</a></li>
        <li><a href="about.html" class="font-bold text-gray-700 hover:text-blue-600">Sobre Mim</a></li>
        <li><a href="projects.html" class="font-bold text-gray-700 hover:text-blue-600">Projetos</a></li>
        <li><a href="drawings.html" class="font-bold text-blue-500 hover:text-blue-600">Desenhos</a></li>
      </ul>
    </nav>
  </header>

  <main class="bg-white rounded-3xl shadow-2xl p-8 sm:p-12 w-full max-w-4xl text-center flex flex-col items-center">
    <h1 class="text-4xl sm:text-5xl font-extrabold text-blue-500 mb-8">Galeria dos Visitantes</h1>

    <!-- Upload de arquivo -->
    <section class="w-full max-w-md bg-blue-50 p-6 rounded-lg shadow-inner mb-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">Adicionar um Desenho</h2>
      <input type="file" id="file-upload-input" accept="image/*" class="w-full mb-4">
      <button id="file-upload-btn" class="w-full bg-blue-500 text-white font-bold py-3 px-8 rounded-full hover:bg-blue-600">
        Fazer Upload de Imagem
      </button>
      <p id="file-upload-status" class="mt-4 text-sm text-gray-600 hidden">Fazendo upload...</p>
    </section>

    <!-- Canvas -->
    <section class="w-full max-w-2xl bg-blue-50 p-6 rounded-lg shadow-inner mb-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">Criar um Desenho</h2>
      <canvas id="drawing-canvas" class="w-full h-64 bg-white border-2 border-blue-500 rounded-lg"></canvas>
      <button id="canvas-upload-btn" class="mt-4 w-full bg-green-500 text-white font-bold py-3 px-8 rounded-full hover:bg-green-600">
        Salvar e Enviar
      </button>
      <p id="canvas-upload-status" class="mt-4 text-sm text-gray-600 hidden">Salvando desenho...</p>
    </section>

    <!-- Galeria -->
    <section class="w-full">
      <h2 class="sr-only">Galeria de Desenhos Enviados</h2>
      <div id="drawings-gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <p id="loading-drawings" class="col-span-full text-gray-500">Carregando desenhos...</p>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div id="notification-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm mx-auto text-center">
      <p id="notification-message" class="text-lg text-gray-800"></p>
      <button id="notification-close-btn" class="mt-4 bg-blue-500 text-white font-bold py-2 px-6 rounded-full hover:bg-blue-600">OK</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    // Configuração corrigida
    const firebaseConfig = {
      apiKey: "AIzaSyA6UJ3nC1WD0HQxbGBKm-L4Bmbk5_YdTNM",
      authDomain: "kayque-e2385.firebaseapp.com",
      projectId: "kayque-e2385",
      storageBucket: "kayque-e2385.appspot.com", // CORRIGIDO
      messagingSenderId: "719897671237",
      appId: "1:719897671237:web:d9a1f4ad69a0e72ff3952c",
      measurementId: "G-LEBFZLRYC6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    let userId = null;

    // Modal
    const notificationModal = document.getElementById('notification-modal');
    const notificationMessage = document.getElementById('notification-message');
    const notificationCloseBtn = document.getElementById('notification-close-btn');
    function showModal(msg) {
      notificationMessage.textContent = msg;
      notificationModal.classList.remove('hidden');
    }
    notificationCloseBtn.addEventListener('click', () => notificationModal.classList.add('hidden'));

    // Upload genérico
    async function uploadFile(file, statusElement) {
      if (!userId) {
        showModal("Autenticação necessária. Recarregue a página.");
        return false;
      }
      statusElement.classList.remove('hidden');
      try {
        const filePath = `drawings/${userId}_${Date.now()}_${file.name}`;
        const fileRef = ref(storage, filePath);
        const uploadResult = await uploadBytes(fileRef, file);
        const imageUrl = await getDownloadURL(uploadResult.ref);
        await addDoc(collection(db, "drawings"), {
          imageUrl,
          userId,
          timestamp: serverTimestamp(),
          userName: "Anônimo"
        });
        showModal("Desenho enviado com sucesso!");
        return true;
      } catch (err) {
        console.error("Erro no upload:", err);
        showModal("Erro ao enviar o desenho.");
        return false;
      } finally {
        statusElement.classList.add('hidden');
      }
    }

    // Upload de arquivo
    const fileUploadBtn = document.getElementById('file-upload-btn');
    const fileUploadInput = document.getElementById('file-upload-input');
    const fileUploadStatus = document.getElementById('file-upload-status');
    fileUploadBtn.addEventListener('click', async () => {
      const file = fileUploadInput.files[0];
      if (!file) return showModal("Selecione um arquivo.");
      await uploadFile(file, fileUploadStatus);
      fileUploadInput.value = '';
    });

    // Upload do canvas
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    const canvasUploadBtn = document.getElementById('canvas-upload-btn');
    const canvasUploadStatus = document.getElementById('canvas-upload-status');
    canvasUploadBtn.addEventListener('click', async () => {
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      const blob = await fetch(dataUrl).then(r => r.blob());
      const file = new File([blob], "canvas_drawing.jpeg", { type: "image/jpeg" });
      await uploadFile(file, canvasUploadStatus);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // Galeria em tempo real
    const drawingsGallery = document.getElementById('drawings-gallery');
    const loadingDrawings = document.getElementById('loading-drawings');
