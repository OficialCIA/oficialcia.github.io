<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kayque Olimpio | Galeria Comunitária</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #d1fae5 0%, #bfdbfe 50%, #ddd6fe 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 20px;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }
    canvas {
      background: white;
      touch-action: none; /* Bloqueia o scroll enquanto desenha */
      cursor: crosshair;
      border-radius: 1rem;
    }
    .gallery-item {
      width: 150px; height: 100px;
      object-fit: cover;
      border-radius: 0.5rem;
      border: 2px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <nav class="mb-8">
    <ul class="flex space-x-6 text-gray-700 font-bold">
      <li><a href="index.html" class="hover:text-blue-600">Início</a></li>
      <li><a href="drawings.html" class="text-blue-600 border-b-2 border-blue-600">Desenhos</a></li>
    </ul>
  </nav>

  <main class="glass-card w-full max-w-2xl p-6 text-center mb-10">
    <h1 class="text-2xl font-extrabold text-gray-800 mb-4">Mural Criativo</h1>
    
    <div class="flex justify-center gap-4 mb-4">
      <input type="color" id="colorPicker" value="#000000" class="w-10 h-10 cursor-pointer">
      <button onclick="clearCanvas()" class="text-red-500 font-bold text-xs uppercase">Limpar</button>
    </div>

    <canvas id="canvas" width="600" height="400" class="w-full shadow-inner border"></canvas>

    <div class="mt-6 flex flex-wrap justify-center gap-3">
      <label class="bg-gray-800 text-white px-5 py-2 rounded-full font-bold cursor-pointer text-sm">
        Importar Foto
        <input type="file" id="uploadFile" class="hidden" accept="image/*">
      </label>
      
      <button onclick="saveToGallery()" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-blue-700">
        Publicar no Mural
      </button>
    </div>
  </main>

  <section class="w-full max-w-4xl">
    <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">Desenhos Salvos</h2>
    <div id="gallery" class="flex flex-wrap justify-center gap-4">
      </div>
  </section>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const galleryContainer = document.getElementById('gallery');
    let drawing = false;

    // Ajuste de DPI/Escala
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000000';

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches.clientX : e.clientX;
      const clientY = e.touches ? e.touches.clientY : e.clientY;
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function start(e) { drawing = true; draw(e); }
    function stop() { drawing = false; ctx.beginPath(); }
    
    function draw(e) {
      if (!drawing) return;
      e.preventDefault();
      const pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    // Eventos Mouse e Touch
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stop);

    document.getElementById('colorPicker').onchange = (e) => ctx.strokeStyle = e.target.value;

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // Upload de Foto
    document.getElementById('uploadFile').addEventListener('change', function(e) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(e.target.files);
    });

    // SISTEMA DE GALERIA (LocalStorage)
    function saveToGallery() {
      const dataURL = canvas.toDataURL();
      let savedItems = JSON.parse(localStorage.getItem('kayque_gallery') || '[]');
      savedItems.push(dataURL);
      localStorage.setItem('kayque_gallery', JSON.stringify(savedItems));
      renderGallery();
      clearCanvas();
      alert("Desenho publicado no seu mural local!");
    }

    function renderGallery() {
      galleryContainer.innerHTML = '';
      const savedItems = JSON.parse(localStorage.getItem('kayque_gallery') || '[]');
      savedItems.reverse().forEach(imgData => {
        const img = document.createElement('img');
        img.src = imgData;
        img.className = 'gallery-item';
        galleryContainer.appendChild(img);
      });
    }

    // Carregar galeria ao abrir
    window.onload = renderGallery;

    function changeColor(c) { ctx.strokeStyle = c; }
  </script>

</body>
</html>
