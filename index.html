<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c2e9fb">

  <title>Kayque Olimpio</title>
  <meta name="description" content="Página de entrada de Kayque Olimpio, com um menu de navegação e links importantes.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
    }

    /* Glow suave no card */
    .card-glow {
      animation: pulse-glow 4s infinite alternate;
    }
    @keyframes pulse-glow {
      from {
        box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3);
      }
      to {
        box-shadow: 0 20px 40px rgba(88, 166, 255, 0.6);
      }
    }

    /* Carta animada */
    .joker-card {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      z-index: 10;
      animation: swing 5s ease-in-out infinite;
      transform-origin: top center;
      transition: transform 0.3s ease-out;
    }
    @keyframes swing {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(6deg); }
      75% { transform: rotate(-6deg); }
    }
    .joker-card:hover {
      animation-play-state: paused;
      transform: scale(1.2) rotate(8deg);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-100 via-blue-200 to-blue-300 min-h-screen flex flex-col items-center justify-center p-6">

  <!-- Ícone animado -->
  <img src="https://img.icons8.com/ios-filled/50/joker-card.png" alt="Ícone de carta de palhaço" class="joker-card">

  <!-- Navegação -->
  <nav class="w-full max-w-lg mb-10">
    <ul class="flex justify-center space-x-6 text-lg sm:text-xl">
      <li><a href="index.html" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">Início</a></li>
      <li><a href="about.html" class="font-bold text-gray-700 hover:text-blue-600 transition-colors">Sobre Mim</a></li>
      <li><a href="projects.html" class="font-bold text-gray-700 hover:text-blue-600 transition-colors">Projetos</a></li>
      <li><a href="drawings.html" class="font-bold text-gray-700 hover:text-blue-600 transition-colors">Desenhos</a></li>
    </ul>
  </nav>

  <!-- Card principal -->
  <main class="card-glow bg-white rounded-3xl shadow-2xl p-10 sm:p-14 w-full max-w-lg text-center transform transition-all hover:scale-105 duration-500">
    
    <h1 class="text-5xl sm:text-6xl font-extrabold text-blue-600 mb-6 tracking-tight">Kayque Olimpio</h1>
    
    <p id="quote-text" class="text-gray-700 text-lg sm:text-xl leading-relaxed mb-8 font-medium min-h-[56px]"></p>
    
    <a href="https://www.instagram.com/kayquewrld/" target="_blank" rel="noopener noreferrer" 
       class="inline-flex items-center justify-center bg-gradient-to-r from-blue-500 to-blue-700 text-white font-bold py-3 px-10 rounded-full shadow-lg transition-transform duration-300 hover:scale-110 hover:shadow-xl">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
      </svg>
      Meu Instagram
    </a>
  </main>

  <!-- Script de digitação -->
  <script>
    const quoteElement = document.getElementById('quote-text');
    const quote = '"A história de todas as sociedades até hoje existentes é a história das lutas de classes."';
    
    let i = 0;
    let speed = 40;

    function typeWriter() {
      if (i < quote.length) {
        quoteElement.textContent += quote.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      }
    }
    window.onload = typeWriter;
  </script>

</body>
</html>
