<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayque Olimpio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      margin: 0;
      padding: 0;
    }
    /* Estado inicial: invisível e deslocado */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s ease, transform 1s ease;
    }
    /* Estado final: visível */
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-blue-200">

  <header class="p-6 text-center">
    <h1 class="text-5xl font-extrabold text-blue-600 reveal">Kayque Olimpio</h1>
    <p class="text-lg text-gray-700 reveal">Bem-vindo ao meu espaço pessoal</p>
  </header>

  <main class="space-y-32 p-8">
    <section class="reveal text-center">
      <h2 class="text-4xl font-bold text-blue-500 mb-4">Sobre Mim</h2>
      <p class="text-lg text-gray-700">Sou apaixonado por tecnologia, arte e inovação.</p>
    </section>

    <section class="reveal text-center">
      <h2 class="text-4xl font-bold text-blue-600 mb-4">Projetos</h2>
      <a href="projects.html" class="bg-blue-500 text-white py-3 px-8 rounded-full shadow-lg hover:bg-blue-600 transition">Ver Projetos</a>
    </section>

    <section class="reveal text-center">
      <h2 class="text-4xl font-bold text-blue-700 mb-4">Desenhos</h2>
      <a href="drawings.html" class="bg-green-500 text-white py-3 px-8 rounded-full shadow-lg hover:bg-green-600 transition">Ver Galeria</a>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target); // evita reaplicar várias vezes
          }
        });
      }, { threshold: 0.2 });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    });
  </script>
</body>
</html>
