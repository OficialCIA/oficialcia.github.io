<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayque Olimpio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    main {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      height: 100vh;
    }
    section {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 1s ease, transform 1s ease;
    }
    section.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-blue-200">

  <main>
    <!-- Seção 1 -->
    <section class="bg-white">
      <div class="text-center">
        <h1 class="text-6xl font-extrabold text-blue-600 mb-4">Kayque Olimpio</h1>
        <p class="text-xl text-gray-700">Bem-vindo ao meu espaço pessoal</p>
      </div>
    </section>

    <!-- Seção 2 -->
    <section class="bg-blue-100">
      <div class="text-center max-w-xl">
        <h2 class="text-4xl font-bold text-blue-500 mb-4">Sobre Mim</h2>
        <p class="text-lg text-gray-700">Sou apaixonado por tecnologia, arte e inovação.</p>
      </div>
    </section>

    <!-- Seção 3 -->
    <section class="bg-blue-200">
      <div class="text-center">
        <h2 class="text-4xl font-bold text-blue-600 mb-4">Projetos</h2>
        <a href="projects.html" class="bg-blue-500 text-white py-3 px-8 rounded-full shadow-lg hover:bg-blue-600 transition">Ver Projetos</a>
      </div>
    </section>

    <!-- Seção 4 -->
    <section class="bg-blue-300">
      <div class="text-center">
        <h2 class="text-4xl font-bold text-blue-700 mb-4">Desenhos</h2>
        <a href="drawings.html" class="bg-green-500 text-white py-3 px-8 rounded-full shadow-lg hover:bg-green-600 transition">Ver Galeria</a>
      </div>
    </section>
  </main>

  <script>
    // IntersectionObserver para animar seções ao entrar na tela
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('section').forEach(sec => observer.observe(sec));
  </script>
</body>
</html>
