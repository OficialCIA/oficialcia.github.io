<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c2e9fb">

  <title>Kayque Olimpio | Home</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #d1fae5 0%, #bfdbfe 50%, #ddd6fe 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    body.loaded { opacity: 1; }

    /* Efeito de saída suave */
    .fade-out { opacity: 0 !important; }

    /* Glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      transition: all 0.4s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.8);
    }

    .joker-float { animation: float 4s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::after {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      transition: 0.6s;
    }
    .btn-shine:hover::after { left: 120%; }
  </style>
</head>

<body class="p-6">

  <div class="flex flex-col items-center w-full max-w-lg">
    
    <div class="mb-6 reveal" style="transition-delay: 0.1s;">
      <img src="https://img.icons8.com/ios-filled/100/joker-card.png" 
           alt="Joker" class="w-16 h-16 opacity-60 joker-float">
    </div>

    <nav class="mb-10 reveal" style="transition-delay: 0.3s;">
      <ul class="flex space-x-8 text-gray-700 font-bold">
        <li><a href="index.html" class="text-blue-600 border-b-2 border-blue-600">Início</a></li>
        <li><a href="about.html" class="nav-link hover:text-blue-600 transition-colors">Sobre</a></li>
        <li><a href="projects.html" class="nav-link hover:text-blue-600 transition-colors">Projetos</a></li>
        <li><a href="drawings.html" class="nav-link hover:text-blue-600 transition-colors">Desenhos</a></li>
      </ul>
    </nav>

    <main class="glass-card rounded-3xl p-10 sm:p-14 w-full text-center reveal" style="transition-delay: 0.5s;">
      <h1 class="text-5xl font-extrabold text-gray-800 mb-6 tracking-tight">
        Kayque Olimpio
      </h1>
      
      <p id="quote-text" class="text-gray-600 text-lg leading-relaxed mb-8 font-medium min-h-[60px]"></p>
      
      <div class="flex flex-wrap justify-center gap-4 mb-6">
        <a href="https://www.instagram.com/kayquewrld/" target="_blank" rel="noopener noreferrer"
           class="btn-shine inline-flex items-center gap-2 bg-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.308.974.975 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.334 2.633-1.308 3.608-.975.974-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.334-3.608-1.308-.974-.975-1.246-2.242-1.308-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.334-2.633 1.308-3.608C4.516 2.497 5.783 2.225 7.149 2.163 8.415 2.105 8.795 2.163 12 2.163zm0-2.163c-3.259 0-3.667.014-4.947.072-1.615.074-3.036.434-4.188 1.586C1.713 2.81 1.353 4.231 1.279 5.846.014 8.415 0 8.741 0 12c0 3.259.014 3.667.072 4.947.074 1.615.434 3.036 1.586 4.188 1.152 1.152 2.573 1.512 4.188 1.586C7.126 23.986 7.534 24 12 24s4.874-.014 4.947-.072c1.615-.074 3.036-.434 4.188-1.586 1.152-1.152 1.512-2.573 1.586-4.188C23.986 15.874 24 15.466 24 12s-.014-4.874-.072-4.947c-.074-1.615-.434-3.036-1.586-4.188C21.19 1.713 19.769 1.353 18.154 1.279 15.585.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
          </svg>
          Instagram
        </a>

        <a href="http://lattes.cnpq.br/" target="_blank" rel="noopener noreferrer"
           class="btn-shine inline-flex items-center gap-2 bg-violet-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6zm2-5h8v1.5H8V15zm0-3h8v1.5H8V12zm0-3h4v1.5H8V9z"/>
          </svg>
          Currículo Lattes
        </a>
      </div>

      <a href="mailto:kayque@olimpio.me"
         class="inline-flex items-center gap-2 text-gray-500 hover:text-blue-600 transition-colors duration-300 font-medium text-sm sm:text-base">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4.7-8 5.334L4 8.7V6.297l8 5.333 8-5.333V8.7z"/>
        </svg>
        kayque@olimpio.me
      </a>
    </main>

  </div>

  <script>
    // 1. Efeito de Digitação
    const quoteElement = document.getElementById('quote-text');
    const quote = '"A história de todas as sociedades até hoje existentes é a história das lutas de classes."';
    let i = 0;
    function typeWriter() {
      if (i < quote.length) {
        quoteElement.textContent += quote.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    // 2. Inicialização e Navegação
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add('loaded');
      
      // Ativa elementos reveal
      setTimeout(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
      }, 150);

      // Inicia digitação
      setTimeout(typeWriter, 1000);

      // Lógica de transição suave entre páginas
      const navLinks = document.querySelectorAll('.nav-link');
      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const target = link.getAttribute('href');
          
          document.body.classList.add('fade-out');
          
          setTimeout(() => {
            window.location.href = target;
          }, 500);
        });
      });
    });
  </script>

</body>
</html>
