<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c2e9fb">

  <title>Kayque Olimpio | Design Clean</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #d1fae5 0%, #bfdbfe 50%, #ddd6fe 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1s ease-in;
    }

    body.loaded { opacity: 1; }

    /* Card com Glassmorphism (Efeito Vidro) */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .glass-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 30px 60px rgba(59, 130, 246, 0.2);
    }

    /* Animação suave do Joker */
    .joker-float {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }

    /* Sistema de entrada suave (Reveal) */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Efeito de brilho no botão */
    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      transition: 0.5s;
    }
    .btn-shine:hover::after {
      left: 120%;
    }

    /* Delays de entrada */
    .delay-1 { transition-delay: 0.2s; }
    .delay-2 { transition-delay: 0.4s; }
    .delay-3 { transition-delay: 0.6s; }
  </style>
</head>

<body class="p-6">

  <div class="flex flex-col items-center w-full max-w-lg">
    
    <div class="mb-6 reveal delay-1">
      <img src="https://img.icons8.com/ios-filled/100/joker-card.png" 
           alt="Joker" class="w-16 h-16 opacity-70 joker-float">
    </div>

    <nav class="mb-10 reveal delay-2">
      <ul class="flex space-x-8 text-gray-700 font-bold">
        <li><a href="#" class="hover:text-blue-600 transition-colors">Início</a></li>
        <li><a href="#" class="hover:text-blue-600 transition-colors">Sobre</a></li>
        <li><a href="#" class="hover:text-blue-600 transition-colors">Projetos</a></li>
      </ul>
    </nav>

    <main class="glass-card rounded-3xl p-10 sm:p-14 w-full text-center reveal delay-3">
      <h1 class="text-5xl font-extrabold text-gray-800 mb-6 tracking-tight">
        Kayque Olimpio
      </h1>
      
      <p id="quote-text" class="text-gray-600 text-lg leading-relaxed mb-8 font-medium min-h-[60px]"></p>
      
      <a href="https://www.instagram.com/kayquewrld/" target="_blank" 
         class="btn-shine inline-flex items-center bg-blue-600 text-white font-bold py-3 px-12 rounded-full shadow-lg transition-all active:scale-95">
        Instagram
      </a>
    </main>

  </div>

  <script>
    // 1. Efeito de Digitação
    const quoteElement = document.getElementById('quote-text');
    const quote = '"A história de todas as sociedades até hoje existentes é a história das lutas de classes."';
    let i = 0;
    function typeWriter() {
      if (i < quote.length) {
        quoteElement.textContent += quote.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
      }
    }

    // 2. Inicialização
    document.addEventListener("DOMContentLoaded", () => {
      // Ativa o corpo
      document.body.classList.add('loaded');
      
      // Ativa os reveals
      setTimeout(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
      }, 100);

      // Inicia digitação
      setTimeout(typeWriter, 1000);
    });
  </script>

</body>
</html>
