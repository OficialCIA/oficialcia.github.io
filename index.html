<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayque Olimpio</title>
  <meta name="description" content="Página de entrada de Kayque Olimpio com scroll fluido.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      scroll-snap-type: y mandatory; /* ativa snapping vertical */
      overflow-y: scroll;
      height: 100vh;
    }
    section {
      scroll-snap-align: start; /* cada seção alinha no início */
      height: 100vh; /* ocupa tela inteira */
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.8s ease-in-out;
    }
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-blue-200">

  <!-- Seção 1 -->
  <section class="bg-white">
    <div class="fade-in text-center">
      <h1 class="text-6xl font-extrabold text-blue-600 mb-4">Kayque Olimpio</h1>
      <p class="text-xl text-gray-700">Bem-vindo ao meu espaço pessoal</p>
    </div>
  </section>

  <!-- Seção 2 -->
  <section class="bg-blue-100">
    <div class="fade-in text-center max-w-xl">
      <h2 class="text-4xl font-bold text-blue-500 mb-4">Sobre Mim</h2>
      <p class="text-lg text-gray-700">Sou apaixonado por tecnologia, arte e inovação. Aqui compartilho meus projetos e ideias.</p>
    </div>
  </section>

  <!-- Seção 3 -->
  <section class="bg-blue-200">
    <div class="fade-in text-center">
      <h2 class="text-4xl font-bold text-blue-600 mb-4">Projetos</h2>
      <a href="projects.html" class="bg-blue-500 text-white py-3 px-8 rounded-full shadow-lg hover:bg-blue-600 transition">Ver Projetos</a>
    </div>
  </section>

  <!-- Seção 4 -->
  <section class="bg-blue-300">
    <div class="fade-in text-center">
      <h2 class="text-4xl font-bold text-blue-700 mb-4">Desenhos</h2>
      <a href="drawings.html" class="bg-green-500 text-white py-3 px-8 rounded-full shadow-lg hover:bg-green-600 transition">Ver Galeria</a>
    </div>
  </section>

  <script>
    // Detecta quando cada seção entra na tela e aplica fade-in
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.querySelector('.fade-in').classList.add('visible');
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('section').forEach(sec => observer.observe(sec));
  </script>
</body>
</html>
