<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c2e9fb">

  <title>Kayque Olimpio | Parallax Total</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --scroll: 0; /* Variável que o JS vai atualizar */
    }

    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
      /* Altura grande para garantir o scroll */
      height: 3000px; 
      background-color: #d1fae5;
    }
    
    body.loaded { opacity: 1; transform: translateY(0); }
    .fade-out { opacity: 0 !important; transition: opacity 0.5s ease-in-out !important; }

    /* Fundo Parallax - Move com base na variável --scroll */
    .bg-parallax {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 120%;
      z-index: -1;
      background: linear-gradient(to bottom right, #d1fae5, #bfdbfe, #ddd6fe);
      transform: translateY(calc(var(--scroll) * 0.2px));
      pointer-events: none;
    }

    /* Card Principal - Move para cima ao rolar */
    #main-card {
      transform: translateY(calc(var(--scroll) * -0.2px));
      will-change: transform;
    }

    /* Joker - Desce mais rápido */
    #joker-parallax {
      transform: translateY(calc(var(--scroll) * 0.5px)) rotate(calc(var(--scroll) * 0.05deg));
    }

    .card-glow { animation: pulse-glow 4s infinite alternate; }
    @keyframes pulse-glow {
      from { box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3); }
      to   { box-shadow: 0 20px 40px rgba(88, 166, 255, 0.6); }
    }

    .joker-card {
      position: absolute; top: 20px; right: 20px;
      width: 45px; z-index: 10;
      transform-origin: top center;
    }

    /* Sistema de Reveal (Entrada Suave) */
    .reveal {
      opacity: 0;
      transition: opacity 1s ease-out;
    }
    .reveal.visible { opacity: 1; }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.3s; }
    .reveal-delay-3 { transition-delay: 0.5s; }
  </style>
</head>

<body class="p-6">

  <div class="bg-parallax"></div>

  <div class="flex flex-col items-center justify-start min-h-screen pt-20">
    
    <img src="https://img.icons8.com/ios-filled/50/joker-card.png" alt="Joker" 
         class="joker-card reveal reveal-delay-1" id="joker-parallax">

    <nav class="w-full max-w-lg mb-12 reveal reveal-delay-2">
      <ul class="flex justify-center space-x-6 text-lg sm:text-xl">
        <li><a href="index.html" class="font-bold text-blue-600 border-b-2 border-blue-600">Início</a></li>
        <li><a href="about.html" class="font-bold text-gray-700 hover:text-blue-600 transition-colors">Sobre</a></li>
        <li><a href="projects.html" class="font-bold text-gray-700 hover:text-blue-600 transition-colors">Projetos</a></li>
      </ul>
    </nav>

    <main id="main-card" class="card-glow bg-white/80 backdrop-blur-md rounded-3xl p-10 sm:p-14 w-full max-w-lg text-center reveal reveal-delay-3">
      <h1 class="text-5xl sm:text-6xl font-extrabold text-blue-600 mb-6 tracking-tight">
        Kayque Olimpio
      </h1>
      
      <p id="quote-text" class="text-gray-700 text-lg sm:text-xl leading-relaxed mb-8 font-medium min-h-[60px]"></p>
      
      <a href="https://www.instagram.com/kayquewrld/" target="_blank" rel="noopener noreferrer" 
         class="inline-flex items-center bg-gradient-to-r from-blue-600 to-blue-500 text-white font-bold py-3 px-10 rounded-full shadow-lg hover:scale-110 transition-transform">
        Instagram
      </a>
    </main>

    <p class="mt-96 text-blue-400 font-bold">Role para baixo para ver o Parallax!</p>
  </div>

  <script>
    // 1. Atualiza a variável de scroll no CSS
    window.addEventListener('scroll', () => {
      document.documentElement.style.setProperty('--scroll', window.scrollY);
    });

    // 2. Digitação
    const quoteElement = document.getElementById('quote-text');
    const quote = '"A história de todas as sociedades até hoje existentes é a história das lutas de classes."';
    let charIndex = 0;
    function typeWriter() {
      if (charIndex < quote.length) {
        quoteElement.textContent += quote.charAt(charIndex);
        charIndex++;
        setTimeout(typeWriter, 40);
      }
    }

    // 3. Inicialização
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add('loaded');
      setTimeout(typeWriter, 1200);

      // Intersection Observer simples
      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      });
      reveals.forEach(el => observer.observe(el));
    });
  </script>

</body>
</html>
