<!DOCTYPE html>

  <title>Kayque Olimpio | Home</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #d1fae5 0%, #bfdbfe 50%, #ddd6fe 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    body.loaded { opacity: 1; }

    /* Efeito de saída suave */
    .fade-out { opacity: 0 !important; }

    /* Glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      transition: all 0.4s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.8);
    }

    .joker-float { animation: float 4s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::after {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      transition: 0.6s;
    }
    .btn-shine:hover::after { left: 120%; }
  </style>
</head>

<body class="p-6">

  <div class="flex flex-col items-center w-full max-w-lg">
    
    <div class="mb-6 reveal" style="transition-delay: 0.1s;">
      <img src="https://img.icons8.com/ios-filled/100/joker-card.png" 
           alt="Joker" class="w-16 h-16 opacity-60 joker-float">
    </div>

    <nav class="mb-10 reveal" style="transition-delay: 0.3s;">
      <ul class="flex space-x-8 text-gray-700 font-bold">
        <li><a href="index.html" class="text-blue-600 border-b-2 border-blue-600">Início</a></li>

        <li><a href="projects.html" class="nav-link hover:text-blue-600 transition-colors">Projetos</a></li>

    </main>

  </div>

  <script>
    // 1. Efeito de Digitação
    const quoteElement = document.getElementById('quote-text');
    const quote = '"A história de todas as sociedades até hoje existentes é a história das lutas de classes."';
    let i = 0;
    function typeWriter() {
      if (i < quote.length) {
        quoteElement.textContent += quote.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    // 2. Inicialização e Navegação
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add('loaded');
      
      // Ativa elementos reveal
      setTimeout(() => {
        document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
      }, 150);

      // Inicia digitação
      setTimeout(typeWriter, 1000);

      // Lógica de transição suave entre páginas
      const navLinks = document.querySelectorAll('.nav-link');
      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const target = link.getAttribute('href');
          
          document.body.classList.add('fade-out');
          
          setTimeout(() => {
            window.location.href = target;
          }, 500);
        });
      });
    });
  </script>

</body>
</html>
