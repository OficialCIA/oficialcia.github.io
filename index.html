<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayque Olimpio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: linear-gradient(135deg, #d1fae5 0%, #bfdbfe 50%, #ddd6fe 100%);
      background-attachment: fixed;
    }

    nav {
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    nav ul li a {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      color: #4b5563;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.25s, color 0.25s;
    }

    nav ul li a:hover {
      background: rgba(255, 255, 255, 0.6);
      color: #1d4ed8;
    }

    .card {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
      padding: 40px 32px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: reveal 0.7s ease both;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar-wrapper {
      animation: float 4s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
    }

    .name {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 12px;
      min-height: 2.2rem;
      letter-spacing: 0.01em;
    }

    .typewriter-cursor {
      display: inline-block;
      width: 2px;
      background: #6366f1;
      margin-left: 2px;
      animation: blink 0.75s step-end infinite;
      vertical-align: text-bottom;
      height: 1.6rem;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .quote {
      font-size: 0.85rem;
      font-style: italic;
      color: #4b5563;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
      max-width: 380px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -75%;
      width: 50%;
      height: 200%;
      background: rgba(255, 255, 255, 0.35);
      transform: skewX(-20deg);
      animation: btn-shine 2.5s infinite;
    }

    @keyframes btn-shine {
      0% { left: -75%; }
      50%, 100% { left: 125%; }
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .btn-instagram {
      background: linear-gradient(135deg, #f9a8d4, #fb7185);
      color: #fff;
    }

    .btn-lattes {
      background: linear-gradient(135deg, #93c5fd, #6366f1);
      color: #fff;
    }

    .email-link {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4b5563;
      text-decoration: none;
      border-bottom: 1px dashed #9ca3af;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .email-link:hover {
      color: #6366f1;
      border-color: #6366f1;
    }

    @media (max-width: 480px) {
      .buttons {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }

      .card {
        padding: 32px 20px;
      }

      .name {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <nav aria-label="Navegação principal">
    <ul>
      <li><a href="about.html">Sobre</a></li>
      <li><a href="projects.html">Projetos</a></li>
      <li><a href="drawings.html">Desenhos</a></li>
    </ul>
  </nav>

  <main class="card">

    <div class="avatar-wrapper">
      <img src="img/img.png" alt="Avatar de Kayque Olimpio" class="avatar" onerror="this.style.display='none'">
    </div>

    <h1 class="name"><span id="typed-name"></span><span class="typewriter-cursor"></span></h1>

    <p class="quote">
      "A história de todas as sociedades até hoje existentes é a história das lutas de classes."
    </p>

    <div class="buttons">
      <a href="https://www.instagram.com/kayquewrld/" target="_blank" rel="noopener noreferrer" class="btn btn-instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        Instagram
      </a>
      <a href="http://lattes.cnpq.br/5363150253158209" target="_blank" rel="noopener noreferrer" class="btn btn-lattes">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Lattes
      </a>
    </div>

    <a href="mailto:kayque@olimpio.me" class="email-link">kayque@olimpio.me</a>

  </main>

  <script>
    (function () {
      const fullName = 'Kayque Olimpio';
      const el = document.getElementById('typed-name');
      let i = 0;
      function type() {
        if (i < fullName.length) {
          el.textContent += fullName[i];
          i++;
          setTimeout(type, 100);
        }
      }
      setTimeout(type, 400);
    }());
  </script>

</body>
</html>
